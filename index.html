<!DOCTYPE html>

<html lang="pl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kalkulator walutowy</title>
  <link rel="icon" href="images/icon.png">
  <meta property="og:image" content="images/share.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css"
    integrity="sha512-NhSC1YmyruXifcj/KFRWoC561YpHpc5Jtzgvbuzx5VozKpWvQ+4nXhPdFgmx8xqexRcpAglTj9sIBWINXa8x5w=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link href="css/style.css" rel="stylesheet">
  <link href="css/form.css" rel="stylesheet">
  <script defer src="js/script.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
    rel="stylesheet">
</head>

<body class="body">
  <header class="header">
    kalkulator walutowy
  </header>
  <div class="formContainer">
    <form class="form form js-form">
      <fieldset class="form__fieldset">
        <p>
          <label>
            <span class="form__labelText">
              Kwota:
            </span>
            <input class="form__amountField js-form__amountField" type="number" name="amount" step="0.01" min="0">
          </label>
        </p>
        <p>
          <label>
            <span class="form__labelText">
              Przelicz z:
            </span>
            <select class="form__currencyField js-currencyFrom" name="currencyFrom">
              <option value="PLN" selected>PLN</option>
              <option value="EUR">EUR</option>
              <option value="USD">USD</option>
              <option value="CHF">CHF</option>
              <option value="GBP">GBP</option>
              <option value="JPY">JPY</option>
            </select>
          </label>
        </p>
        <p>
          <label>
            <span class="form__labelText">
              Przelicz na:
            </span>
            <select class="form__currencyField js-currencyTo" name="currencyTo">
              <option value="PLN">PLN</option>
              <option value="EUR" selected>EUR</option>
              <option value="USD">USD</option>
              <option value="CHF">CHF</option>
              <option value="GBP">GBP</option>
              <option value="JPY">JPY</option>
            </select>
          </label>
        </p>
        <p class="form__currencyRate">
          <span class="js-form__currencyRate--from">1 PLN</span> = <span class="js-form__currencyRate--to">0.22
            EUR</span>
        </p>
        <div class="form__result">
          <p>
            <span class="form__result--from js-form__result--from">0.00</span>
            <span class="form__result--to js-form__result--to"></span>
          </p>
        </div>
        <div class="form__buttonsContainer">
          <p>
            <button class="form__button">Oblicz</button>
          </p>
          <p>
            <button type="reset" class="form__button form__button--reset">Resetuj</button>
          </p>
        </div>
      </fieldset>
    </form>
  </div>
  <footer class="footer">Kursy obliczane na podstawie danych z dnia 13.04.2023</footer>
</body>

</html>
